name: ⚡ Build APK - Fast & Reliable

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILDOZER_LOG_LEVEL: info

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: ⬇️ Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 🐍 Setup Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
    
    - name: 📦 Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq --no-install-recommends \
          build-essential \
          libffi-dev \
          libssl-dev \
          python3-dev \
          git \
          wget \
          curl \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config \
          openjdk-17-jdk \
          ant
    
    - name: 📥 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel -q
        pip install -q \
          buildozer==1.5.0 \
          cython==0.29.37 \
          kivy==2.3.0 \
          requests \
          pyjnius \
          plyer
    
    - name: ⚡ Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: 🔍 Verify buildozer.spec exists
      run: |
        if [ ! -f "buildozer.spec" ]; then
          echo "❌ buildozer.spec NOT found!"
          echo "Creating default..."
          buildozer init
        fi
        echo "✅ buildozer.spec found"
    
    - name: 🔧 Fix buildozer.spec configuration
      run: |
        # إصلاح المسارات والإعدادات
        sed -i 's/android.arch = .*/android.archs = arm64-v8a,armeabi-v7a/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
        sed -i 's/android.sdk = .*/android.sdk = 31/' buildozer.spec
        sed -i 's/android.api = .*/android.api = 31/' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/android.target_api = .*/android.target_api = 31/' buildozer.spec
        sed -i 's/android.release_artifact = .*/android.release_artifact = apk/' buildozer.spec
        
        echo "✅ buildozer.spec configured"
        echo ""
        echo "Current configuration:"
        grep -E "android\.(arch|ndk|sdk|api)" buildozer.spec
    
    - name: 🧹 Clean old builds
      run: |
        rm -rf .buildozer/android/platform/build-* 2>/dev/null || true
        rm -rf .buildozer/android/app/build 2>/dev/null || true
        echo "✅ Cleaned old builds"
    
    - name: 📱 Build APK (Release)
      timeout-minutes: 90
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Xmx2048m"
        GRADLE_OPTS: "-Xmx2048m"
      run: |
        echo "========================================="
        echo "🚀 Starting APK Build..."
        echo "========================================="
        echo ""
        
        # تعيين متغيرات البيئة
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        
        # عرض معلومات النظام
        echo "Java version:"
        java -version
        echo ""
        echo "Ant version:"
        ant -version
        echo ""
        
        # البناء
        buildozer android release 2>&1 | tee build.log
        
        BUILD_STATUS=${PIPESTATUS[0]}
        
        if [ $BUILD_STATUS -eq 0 ]; then
          echo ""
          echo "✅ Build completed successfully!"
        else
          echo ""
          echo "❌ Build failed with exit code: $BUILD_STATUS"
          echo ""
          echo "Last 150 lines of build log:"
          tail -150 build.log
          exit 1
        fi
    
    - name: 📦 Verify APK
      if: success()
      run: |
        echo "========================================="
        echo "✅ APK Verification"
        echo "========================================="
        echo ""
        
        if find bin -name "*.apk" -type f 2>/dev/null | grep -q .; then
          echo "✅ APK files found:"
          ls -lh bin/*.apk
          echo ""
          echo "File info:"
          file bin/*.apk
          echo ""
          echo "File size:"
          du -h bin/*.apk
        else
          echo "❌ No APK files found!"
          echo "Searching in build directories..."
          find . -name "*.apk" -type f 2>/dev/null | head -10
          exit 1
        fi
    
    - name: 📦 Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: SafeApp-APK-${{ github.run_number }}
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
    
    - name: 🚀 Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: SafeApp ${{ github.ref }}
        body: |
          🛡️ SafeApp Release
          
          **Build Information:**
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref }}
          
          **Download APK from Artifacts**
        draft: false
        prerelease: false
    
    - name: 📊 Build Summary
      if: always()
      run: |
        echo "========================================="
        echo "📊 Build Summary"
        echo "========================================="
        echo ""
        echo "Status: ${{ job.status }}"
        echo "Duration: ${{ job.duration }}"
        echo "Run Number: ${{ github.run_number }}"
        echo ""
        if [ -f "build.log" ]; then
          echo "Build log size: $(wc -l < build.log) lines"
        fi
