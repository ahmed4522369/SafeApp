name: ⚡ Fast APK Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILDOZER_LOG_LEVEL: debug

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: ⬇️ Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 🐍 Setup Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
    
    - name: 📦 Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq --no-install-recommends \
          build-essential \
          libffi-dev \
          libssl-dev \
          python3-dev \
          git \
          wget \
          curl \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config
    
    - name: 📥 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel --quiet
        pip install --quiet \
          buildozer==1.5.0 \
          cython==0.29.37 \
          kivy==2.3.0 \
          requests \
          pyjnius \
          plyer
    
    - name: ⚡ Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: 🧹 Cleanup Cache
      run: |
        find ~/.buildozer -type f -name "*.pyc" -delete 2>/dev/null || true
        find ~/.buildozer -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
    
    - name: 🔍 Check buildozer.spec
      run: |
        if [ -f "buildozer.spec" ]; then
          echo "✅ buildozer.spec found"
          head -30 buildozer.spec
        else
          echo "❌ buildozer.spec NOT found"
          exit 1
        fi
    
    - name: 📱 Build APK
      timeout-minutes: 50
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
      run: |
        echo "========================================="
        echo "🚀 Starting APK Build..."
        echo "========================================="
        buildozer android release
    
    - name: 📦 Verify APK
      if: success()
      run: |
        echo "✅ APK files found:"
        ls -lh bin/*.apk
    
    - name: 📦 Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AntiVirus-APK-${{ github.run_number }}
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
    
    - name: 🚀 Create Release
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: AntiVirus Guard ${{ github.ref }}
        body: |
          🛡️ AntiVirus Guard APK Release
          Build: ${{ github.run_number }}
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false
    
    - name: 📊 Build Failure Report
      if: failure()
      run: |
        echo "❌ BUILD FAILED"
        echo "Check the logs above for details"
