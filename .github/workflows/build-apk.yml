name: ⚡ Fast APK Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILDOZER_LOG_LEVEL: debug
  JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: ⬇️ Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 🐍 Setup Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
    
    - name: 📦 Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq --no-install-recommends \
          build-essential \
          libffi-dev \
          libssl-dev \
          python3-dev \
          openjdk-11-jdk-headless \
          git \
          wget \
          curl \
          unzip \
          zip \
          autoconf \
          automake \
          libtool
    
    - name: 📥 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel --quiet
        pip install --quiet \
          buildozer==1.5.0 \
          cython==0.29.37 \
          kivy==2.3.0 \
          requests \
          pyjnius \
          plyer
    
    - name: 🔧 Setup Android SDK/NDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 31
        ndk-version: 25.2.9519653
        cache: true
    
    - name: ⚡ Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
          /root/.gradle
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: 🧹 Cleanup Cache
      run: |
        find ~/.buildozer -type f -name "*.pyc" -delete 2>/dev/null || true
        find ~/.buildozer -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
    
    - name: 📋 Check Environment
      run: |
        echo "=== Python ==="
        python --version
        echo ""
        echo "=== Java ==="
        java -version
        echo ""
        echo "=== Android SDK ==="
        echo "ANDROID_HOME: $ANDROID_HOME"
        ls -la $ANDROID_HOME/build-tools/ | tail -5
        echo ""
        echo "=== Buildozer Version ==="
        buildozer --version
    
    - name: 🔍 Check buildozer.spec
      run: |
        if [ -f "buildozer.spec" ]; then
          echo "✅ buildozer.spec found"
          cat buildozer.spec | head -20
        else
          echo "❌ buildozer.spec NOT found - Creating default..."
          buildozer init
        fi
    
    - name: 📱 Build APK
      run: |
        echo "========================================="
        echo "🚀 Starting APK Build..."
        echo "========================================="
        
        ulimit -n 4096
        export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
        
        # محاولة البناء مع عرض كل الأخطاء
        buildozer android release 2>&1
        
        BUILD_STATUS=$?
        
        if [ $BUILD_STATUS -eq 0 ]; then
          echo "✅ Build completed successfully"
        else
          echo "❌ Build failed with exit code: $BUILD_STATUS"
          echo ""
          echo "========================================="
          echo "🔍 Checking for error logs..."
          echo "========================================="
          
          # عرض آخر 100 سطر من السجل
          if [ -f ".buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/outputs/build.log" ]; then
            echo "Found build.log:"
            tail -100 .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/outputs/build.log
          fi
          
          # البحث عن أي ملفات سجل
          find .buildozer -name "*.log" -type f -exec tail -50 {} \; 2>/dev/null
          
          exit 1
        fi
      timeout-minutes: 50
    
    - name: 📦 Verify APK
      if: success()
      run: |
        echo "========================================="
        echo "✅ APK Verification"
        echo "========================================="
        
        if find bin -name "*.apk" -type f 2>/dev/null | grep -q .; then
          echo "✅ APK files found:"
          ls -lh bin/*.apk
          file bin/*.apk
          echo ""
          echo "APK size:"
          du -h bin/*.apk
        else
          echo "❌ No APK files found!"
          echo "Searching entire project..."
          find . -name "*.apk" -type f 2>/dev/null
          exit 1
        fi
    
    - name: 📦 Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AntiVirus-APK-${{ github.run_number }}
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
    
    - name: 🚀 Create Release
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: AntiVirus Guard ${{ github.ref }}
        body: |
          🛡️ AntiVirus Guard APK Release
          Build: ${{ github.run_number }}
        draft: false
        prerelease: false
    
    - name: 📊 Build Failure Report
      if: failure()
      run: |
        echo "========================================="
        echo "❌ BUILD FAILED - Diagnostic Report"
        echo "========================================="
        echo ""
        echo "🔍 System Information:"
        uname -a
        echo ""
        echo "🔍 Disk Space:"
        df -h
        echo ""
        echo "🔍 Memory:"
        free -h
        echo ""
        echo "🔍 Python packages:"
        pip list | grep -E "buildozer|cython|kivy"
        echo ""
        echo "🔍 Gradle cache:"
        du -sh ~/.gradle 2>/dev/null || echo "No gradle cache"
        echo ""
        echo "🔍 Buildozer cache:"
        du -sh ~/.buildozer 2>/dev/null || echo "No buildozer cache"
        echo ""
        echo "========================================="
        echo "Please check the logs above for details"
        echo "========================================="
