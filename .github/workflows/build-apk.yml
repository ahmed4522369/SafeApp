name: ⚡ Fast APK Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILDOZER_LOG_LEVEL: debug

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: ⬇️ Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: 🐍 Setup Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
    
    - name: ☕ Setup Java 17 (Required for Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'none'
    
    - name: 📦 Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq --no-install-recommends \
          build-essential \
          libffi-dev \
          libssl-dev \
          python3-dev \
          git \
          wget \
          curl \
          unzip \
          zip \
          autoconf \
          automake \
          libtool \
          pkg-config
    
    - name: 📥 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel --quiet
        pip install --quiet \
          buildozer==1.5.0 \
          cython==0.29.37 \
          kivy==2.3.0 \
          requests \
          pyjnius \
          plyer
    
    - name: 🤖 Setup Android SDK Manually
      timeout-minutes: 15
      run: |
        echo "========================================="
        echo "🤖 Setting up Android SDK..."
        echo "========================================="
        
        # إنشاء مجلد Android
        mkdir -p $HOME/android-sdk
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        
        # تحميل Command Line Tools
        cd $HOME/android-sdk
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        rm commandlinetools-linux-9477386_latest.zip
        
        # إعادة تنظيم المجلدات
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        # قبول جميع التراخيص
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # تثبيت المكونات المطلوبة
        echo "Installing Android SDK components..."
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          --channel=0 \
          --verbose
        
        echo "✅ Android SDK setup completed"
        
        # حفظ في متغيرات البيئة
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools/bin" >> $GITHUB_PATH
    
    - name: 📋 Verify Java and Android Setup
      run: |
        echo "========================================="
        echo "✅ Verification"
        echo "========================================="
        echo ""
        echo "Java version:"
        java -version
        echo ""
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo ""
        echo "Android SDK platforms:"
        ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms installed"
        echo ""
        echo "Android build-tools:"
        ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools installed"
        echo ""
        echo "Python version:"
        python --version
        echo ""
        echo "Buildozer version:"
        buildozer --version
    
    - name: ⚡ Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: 🧹 Cleanup Cache
      run: |
        find ~/.buildozer -type f -name "*.pyc" -delete 2>/dev/null || true
        find ~/.buildozer -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
    
    - name: 🔍 Check buildozer.spec
      run: |
        if [ -f "buildozer.spec" ]; then
          echo "✅ buildozer.spec found"
          head -30 buildozer.spec
        else
          echo "❌ buildozer.spec NOT found - Creating..."
          buildozer init
          echo "⚠️ Please configure buildozer.spec according to your app"
        fi
    
    - name: 📱 Build APK
      timeout-minutes: 50
      env:
        JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
      run: |
        echo "========================================="
        echo "🚀 Starting APK Build..."
        echo "========================================="
        echo ""
        
        # تعيين متغيرات البيئة
        export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        ulimit -n 4096
        
        # محاولة البناء
        buildozer android release 2>&1 | tee build.log
        
        BUILD_STATUS=${PIPESTATUS[0]}
        
        if [ $BUILD_STATUS -eq 0 ]; then
          echo ""
          echo "✅ Build completed successfully"
        else
          echo ""
          echo "❌ Build failed with exit code: $BUILD_STATUS"
          echo ""
          echo "========================================="
          echo "🔍 Last 100 lines of build log:"
          echo "========================================="
          tail -100 build.log
          exit 1
        fi
    
    - name: 📦 Verify APK
      if: success()
      run: |
        echo "========================================="
        echo "✅ APK Verification"
        echo "========================================="
        echo ""
        
        if find bin -name "*.apk" -type f 2>/dev/null | grep -q .; then
          echo "✅ APK files found:"
          ls -lh bin/*.apk
          echo ""
          file bin/*.apk
          echo ""
          du -h bin/*.apk
        else
          echo "❌ No APK files found!"
          echo "Searching entire project..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found anywhere"
          exit 1
        fi
    
    - name: 📦 Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AntiVirus-APK-${{ github.run_number }}
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
    
    - name: 🚀 Create Release
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: AntiVirus Guard ${{ github.ref }}
        body: |
          🛡️ AntiVirus Guard APK Release
          Build: ${{ github.run_number }}
          Commit: ${{ github.sha }}
        draft: false
        prerelease: false
    
    - name: 📊 Build Failure Report
      if: failure()
      run: |
        echo "========================================="
        echo "❌ BUILD FAILED - Diagnostic Report"
        echo "========================================="
        echo ""
        echo "🔍 Java version:"
        java -version 2>&1 || echo "Java not found"
        echo ""
        echo "🔍 Android SDK:"
        echo "ANDROID_HOME: $ANDROID_HOME"
        ls -la $ANDROID_HOME/ 2>/dev/null || echo "ANDROID_HOME not set"
        echo ""
        echo "🔍 Build log (last 150 lines):"
        if [ -f "build.log" ]; then
          tail -150 build.log
        else
          echo "No build.log found"
        fi
        echo ""
        echo "========================================="
